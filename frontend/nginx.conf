server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Cache static assets (JS, CSS, images) - long cache with hashed filenames
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache media/images
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # JSON data files - short cache since they might update
    location ~* \.json$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # ============================================
    # Redirections anciennes URLs WordPress → nouvelles
    # ============================================
    
    # Gammes
    location = /gamme-usinage { return 301 /gamme/usinage; }
    location = /gamme-chaudronnerie { return 301 /gamme/chaudronnerie; }
    location = /gamme-tolerie { return 301 /gamme/tolerie; }
    location = /gamme-menuiserie { return 301 /gamme/menuiserie; }
    
    # Pages
    location = /a-propos-de { return 301 /a-propos; }
    location = /a-propos-de/ { return 301 /a-propos; }
    location = /ci-dessous-la-brochure-generale { return 301 /brochures; }
    location = /ci-dessous-la-brochure-generale/ { return 301 /brochures; }
    location = /brochure { return 301 /brochures; }
    location = /brochure/ { return 301 /brochures; }
    location = /contactez-nous { return 301 /contact; }
    location = /contactez-nous/ { return 301 /contact; }
    location = /contact-2 { return 301 /contact; }
    location = /nos-partenaires { return 301 /partenaires; }
    location = /nos-partenaires/ { return 301 /partenaires; }
    
    # WordPress patterns courants
    location = /accueil { return 301 /; }
    location = /home { return 301 /; }
    location ~ ^/wp-content/ { return 301 /; }
    location ~ ^/wp-admin/ { return 301 /; }
    location ~ ^/wp-login { return 301 /; }
    location = /wp-sitemap.xml { return 301 /sitemap.xml; }
    location = /sitemap_index.xml { return 301 /sitemap.xml; }
    location = /feed { return 301 /blog; }
    location = /feed/ { return 301 /blog; }

    # ============================================

    # SPA fallback - all routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
